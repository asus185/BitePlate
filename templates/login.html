<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BitePlate - Login</title>
    {% load static %}
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <style>
        .login-bg {
            min-height: 100vh;
            background: linear-gradient(135deg, #0f0f1a 0%, #1a1a2e 50%, #16213e 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }
        .login-bg::before {
            content: '';
            position: absolute;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(230, 57, 70, 0.15) 0%, transparent 70%);
            top: -100px;
            right: -100px;
            border-radius: 50%;
        }
        .login-bg::after {
            content: '';
            position: absolute;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(244, 162, 97, 0.1) 0%, transparent 70%);
            bottom: -50px;
            left: -50px;
            border-radius: 50%;
        }
        .login-card {
            background: rgba(30, 30, 47, 0.9);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 3rem;
            width: 100%;
            max-width: 420px;
            position: relative;
            z-index: 1;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.6s ease-out;
        }
        .login-logo {
            font-size: 3rem;
            text-align: center;
            margin-bottom: 0.5rem;
        }
        .login-title {
            font-family: 'Poppins', sans-serif;
            font-size: 1.75rem;
            font-weight: 700;
            text-align: center;
            background: linear-gradient(135deg, #e63946, #f4a261);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.25rem;
        }
        .login-subtitle {
            text-align: center;
            color: #a0a0b8;
            font-size: 0.9rem;
            margin-bottom: 2rem;
        }
        .login-btn {
            background: linear-gradient(135deg, #e63946, #f4a261);
            border: none;
            color: #fff;
            font-weight: 600;
            padding: 0.75rem;
            border-radius: 10px;
            width: 100%;
            font-size: 1rem;
            transition: all 0.3s ease;
        }
        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(230, 57, 70, 0.4);
            color: #fff;
        }
        .credentials-box {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 10px;
            padding: 1rem;
            margin-top: 1.5rem;
        }
        .credentials-box .cred-title {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #6c6c80;
            margin-bottom: 0.75rem;
            font-weight: 600;
        }
        .cred-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.35rem 0;
            font-size: 0.85rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        .cred-item:last-child { border-bottom: none; }
        .cred-item .role-badge {
            font-size: 0.7rem;
            padding: 0.15rem 0.5rem;
            border-radius: 4px;
            font-weight: 600;
        }
        .role-manager { background: rgba(230, 57, 70, 0.2); color: #e63946; }
        .role-chef { background: rgba(244, 162, 97, 0.2); color: #f4a261; }
        .role-waiter { background: rgba(33, 158, 188, 0.2); color: #219ebc; }
        .role-cashier { background: rgba(45, 106, 79, 0.2); color: #40916c; }
    </style>
</head>
<body>
    <div class="login-bg">
        <div class="login-card">
            <div class="login-logo">🍽️</div>
            <h1 class="login-title">BitePlate</h1>
            <p class="login-subtitle">Smart Restaurant Management System</p>

            {% if messages %}
                {% for message in messages %}
                    <div class="alert alert-danger mb-3">{{ message }}</div>
                {% endfor %}
            {% endif %}

            <form method="POST">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label">Username</label>
                    <input type="text" name="username" class="form-control" placeholder="Enter your username" required autocomplete="username">
                </div>
                <div class="mb-4">
                    <label class="form-label">Password</label>
                    <input type="password" name="password" class="form-control" placeholder="Enter your password" required autocomplete="current-password">
                </div>
                <button type="submit" class="login-btn">Sign In</button>
            </form>

            <div class="credentials-box">
                <div class="cred-title">Default Credentials</div>
                <div class="cred-item">
                    <span>manager / admin123</span>
                    <span class="role-badge role-manager">Manager</span>
                </div>
                <div class="cred-item">
                    <span>chef / chef123</span>
                    <span class="role-badge role-chef">Head Chef</span>
                </div>
                <div class="cred-item">
                    <span>waiter / waiter123</span>
                    <span class="role-badge role-waiter">Waiter</span>
                </div>
                <div class="cred-item">
                    <span>cashier / cashier123</span>
                    <span class="role-badge role-cashier">Cashier</span>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
